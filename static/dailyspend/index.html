<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>dailyspend.city — Coin Shop</title>
  <meta name="description" content="Spend your dawg.city coins on badges, boosts, and upgrades.">
  <link rel="icon" href="https://dawg.city/favicon.svg" type="image/svg+xml">
  <link rel="stylesheet" href="/css/shop.css">
</head>
<body>

  <!-- ── Topbar ──────────────────────────────────────────────────────── -->
  <header id="topbar">
    <a class="logo" href="/">DAILY<span>SPEND</span>.CITY</a>

    <div class="topbar-right" id="auth-area">
      <!-- filled by auth.js -->
    </div>
  </header>

  <!-- ── Category filter bar ─────────────────────────────────────────── -->
  <nav class="category-bar" id="filter-bar">
    <button class="pill active" data-type=""            onclick="Shop.setFilter('')">All</button>
    <button class="pill"        data-type="badge"       onclick="Shop.setFilter('badge')">🎖 Badges</button>
    <button class="pill"        data-type="cosmetic"    onclick="Shop.setFilter('cosmetic')">✨ Cosmetics</button>
    <button class="pill"        data-type="coin_boost"  onclick="Shop.setFilter('coin_boost')">🔥 Boosts</button>
    <button class="pill"        data-type="pass_upgrade" onclick="Shop.setFilter('pass_upgrade')">⭐ Pass Upgrades</button>
  </nav>

  <!-- ── Section label ───────────────────────────────────────────────── -->
  <p class="section-label">Shop</p>

  <!-- ── Shop grid ───────────────────────────────────────────────────── -->
  <div class="shop-grid" id="shop-grid"></div>

  <!-- ── Footer note ─────────────────────────────────────────────────── -->
  <p style="text-align:center;color:var(--muted);font-size:0.82rem;padding:0 20px 40px">
    Earn coins by playing games at
    <a href="https://dawg.city" style="color:var(--accent)">dawg.city</a>.
    Can't reach dawg.city?
    <a href="/redirect.html" style="color:var(--accent)">Find a mirror →</a>
  </p>

  <!-- ── Toast container ─────────────────────────────────────────────── -->
  <div id="toast-container"></div>

  <!-- ── Scripts ─────────────────────────────────────────────────────── -->
  <script src="/js/auth.js"></script>
  <script src="/js/shop.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => Shop.init());
  </script>
</body>
</html>
