<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Item — dailyspend.city</title>
  <link rel="icon" href="https://dawg.city/favicon.svg" type="image/svg+xml">
  <link rel="stylesheet" href="/css/shop.css">
</head>
<body>

  <!-- ── Topbar ──────────────────────────────────────────────────────── -->
  <header id="topbar">
    <a class="logo" href="/">DAILY<span>SPEND</span>.CITY</a>
    <div class="topbar-right" id="auth-area">
      <!-- filled by auth.js -->
    </div>
  </header>

  <!-- ── Breadcrumb ──────────────────────────────────────────────────── -->
  <div style="padding:14px 20px;font-size:0.82rem;color:var(--muted)">
    <a href="/" style="color:var(--accent)">← Shop</a>
  </div>

  <!-- ── Item content (filled by shop.js) ────────────────────────────── -->
  <div id="item-content">
    <div style="padding:60px 20px;text-align:center;color:var(--muted)">Loading…</div>
  </div>

  <!-- ── Toast container ─────────────────────────────────────────────── -->
  <div id="toast-container"></div>

  <!-- ── Scripts ─────────────────────────────────────────────────────── -->
  <script src="/js/auth.js"></script>
  <script src="/js/shop.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const id = new URLSearchParams(location.search).get('id');
      if (id) {
        Shop.loadItem(id);
      } else {
        window.location.href = '/';
      }
    });
  </script>
</body>
</html>
