<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title id="page-title">dawg.city — Play</title>
  <link rel="icon" href="/favicon.svg" type="image/svg+xml">
  <link rel="stylesheet" href="/css/base.css">
  <link rel="stylesheet" href="/css/grid.css">
  <link rel="stylesheet" href="/css/game.css">
</head>
<body class="game-page">

  <!-- ── Topbar ──────────────────────────────────────────────────────── -->
  <header id="topbar">
    <a class="logo" href="/">← DAWG.CITY</a>
    <span id="game-title-label" style="font-weight:700;font-size:1rem;"></span>
    <div class="topbar-right" id="auth-area"></div>
  </header>

  <!-- ── Main layout ─────────────────────────────────────────────────── -->
  <div class="game-layout">

    <!-- Game iframe -->
    <div class="iframe-wrap" id="iframe-wrap">
      <button class="btn-fullscreen" id="btn-fullscreen" title="Fullscreen">⛶ Fullscreen</button>
      <iframe
        id="game-iframe"
        src="about:blank"
        allowfullscreen
        allow="autoplay; fullscreen"
        referrerpolicy="no-referrer"
        sandbox="allow-scripts allow-same-origin allow-forms allow-popups allow-pointer-lock"
      ></iframe>
    </div>

    <!-- Sidebar -->
    <aside class="game-sidebar">

      <!-- Leaderboard section -->
      <div class="sidebar-section">
        <h3>Top Scores</h3>
        <div id="lb-rows">
          <div class="muted" style="padding:8px 0">Loading…</div>
        </div>

        <!-- Submit score (only shown when logged in) -->
        <div id="score-submit-wrap" class="hidden" style="margin-top:12px">
          <p class="muted" style="margin-bottom:6px;font-size:0.8rem">Submit your score:</p>
          <div class="score-form">
            <input type="number" id="score-input" placeholder="Score" min="0">
            <button class="btn btn-primary" id="btn-submit-score">Submit</button>
          </div>
          <div id="score-msg" class="muted" style="margin-top:6px;font-size:0.8rem"></div>
        </div>
      </div>

      <!-- Ad unit -->
      <div class="sidebar-section">
        <div class="ad-slot" id="sidebar-ad">
          <!-- ad tag here -->
          <span>Ad</span>
        </div>
      </div>

    </aside>
  </div>

  <!-- ── Related games ───────────────────────────────────────────────── -->
  <section class="related-section">
    <p class="section-label">More Games</p>
    <div class="game-grid" id="related-grid" style="padding-bottom:16px"></div>
  </section>

  <!-- ── Toast container ─────────────────────────────────────────────── -->
  <div id="toast-container"></div>

  <!-- ── Scripts ─────────────────────────────────────────────────────── -->
  <script src="/js/auth.js"></script>
  <script src="/js/coins.js"></script>
  <script src="/js/games.js"></script>

  <script>
    const API  = 'https://dawg.city';
    const slug = new URLSearchParams(location.search).get('game');

    if (!slug) {
      location.href = '/';
    }

    // ── Load game details + boot iframe ──────────────────────────────
    async function loadGame() {
      try {
        const res = await fetch(`${API}/api/games/${encodeURIComponent(slug)}`);
        if (!res.ok) { location.href = '/'; return; }
        const game = await res.json();

        document.title = `${game.title} — dawg.city`;
        document.getElementById('page-title').textContent = `${game.title} — dawg.city`;
        document.getElementById('game-title-label').textContent = game.title;

        const iframe = document.getElementById('game-iframe');
        iframe.src = game.embed_url;
      } catch (_) {
        location.href = '/';
      }
    }

    // ── Fullscreen ───────────────────────────────────────────────────
    document.getElementById('btn-fullscreen').addEventListener('click', () => {
      const wrap = document.getElementById('iframe-wrap');
      if (document.fullscreenElement) {
        document.exitFullscreen();
      } else {
        wrap.requestFullscreen().catch(() => {});
      }
    });

    // ── Load leaderboard ─────────────────────────────────────────────
    async function loadLeaderboard() {
      const container = document.getElementById('lb-rows');
      try {
        const res = await fetch(`${API}/api/games/${encodeURIComponent(slug)}/leaderboard`);
        if (!res.ok) throw new Error();
        const rows = await res.json();

        if (!rows.length) {
          container.innerHTML = '<div class="muted" style="padding:8px 0">No scores yet. Be first!</div>';
          return;
        }

        container.innerHTML = rows.slice(0, 10).map((r, i) => {
          const rankClass = i === 0 ? 'gold' : i === 1 ? 'silver' : i === 2 ? 'bronze' : '';
          return `
            <div class="score-row">
              <span class="score-rank ${rankClass}">${r.rank}</span>
              <span class="score-name">${escHtml(r.username)}</span>
              <span class="score-value">${r.score.toLocaleString()}</span>
            </div>`;
        }).join('');
      } catch (_) {
        container.innerHTML = '<div class="muted" style="padding:8px 0">Could not load scores.</div>';
      }
    }

    // ── Submit score ─────────────────────────────────────────────────
    document.getElementById('btn-submit-score').addEventListener('click', async () => {
      const input = document.getElementById('score-input');
      const msg   = document.getElementById('score-msg');
      const score = parseInt(input.value, 10);
      if (isNaN(score) || score < 0) { msg.textContent = 'Enter a valid score.'; return; }

      const token = Auth.getToken();
      if (!token) { msg.textContent = 'Log in first.'; return; }

      try {
        const res = await fetch(`${API}/api/games/${encodeURIComponent(slug)}/score`, {
          method: 'POST',
          headers: { Authorization: `Bearer ${token}`, 'Content-Type': 'application/json' },
          body: JSON.stringify({ score })
        });
        const data = await res.json();
        if (res.ok) {
          msg.textContent = data.message ?? 'Score submitted!';
          input.value = '';
          loadLeaderboard();
        } else {
          msg.textContent = data.error ?? 'Error submitting score.';
        }
      } catch (_) {
        msg.textContent = 'Network error.';
      }
    });

    // ── Related games ────────────────────────────────────────────────
    async function loadRelated() {
      const games = await Games.fetchGames();
      const grid  = document.getElementById('related-grid');
      grid.innerHTML = '';
      // Exclude current game and show up to 8
      games
        .filter(g => g.slug !== slug)
        .slice(0, 8)
        .forEach(g => grid.appendChild(Games.buildCard(g)));
    }

    function escHtml(str) {
      return String(str)
        .replace(/&/g,'&amp;').replace(/</g,'&lt;')
        .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    // ── Boot ─────────────────────────────────────────────────────────
    document.addEventListener('DOMContentLoaded', async () => {
      await loadGame();
      loadLeaderboard();
      loadRelated();

      // Show score submit form when logged in
      if (Auth.isLoggedIn()) {
        document.getElementById('score-submit-wrap').classList.remove('hidden');
      }

      // Start coin ping loop
      Coins.startPingLoop(slug);
    });
  </script>
</body>
</html>
