<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>dawg.city — Free Unblocked Games</title>
  <meta name="description" content="Play hundreds of free unblocked games at dawg.city. Earn coins, climb leaderboards, and unlock rewards just by playing.">
  <link rel="icon" href="/favicon.svg" type="image/svg+xml">
  <link rel="stylesheet" href="/css/base.css">
  <link rel="stylesheet" href="/css/grid.css">
</head>
<body>

  <!-- ── Topbar ──────────────────────────────────────────────────────── -->
  <header id="topbar">
    <a class="logo" href="/">DAWG.CITY</a>

    <div class="search-wrap">
      <input type="search" id="search-input" placeholder="Search games…" autocomplete="off">
    </div>

    <div class="topbar-right" id="auth-area">
      <!-- filled by auth.js -->
    </div>
  </header>

  <!-- ── Category filter bar ─────────────────────────────────────────── -->
  <nav class="category-bar" id="category-bar">
    <button class="pill active" data-cat="">All</button>
    <button class="pill" data-cat="action">Action</button>
    <button class="pill" data-cat="puzzle">Puzzle</button>
    <button class="pill" data-cat="io">.io</button>
    <button class="pill" data-cat="racing">Racing</button>
    <button class="pill" data-cat="multiplayer">Multiplayer</button>
    <button class="pill" data-cat="sports">Sports</button>
    <button class="pill" data-cat="shooting">Shooting</button>
    <button class="pill" data-cat="adventure">Adventure</button>
  </nav>

  <!-- ── Featured row ────────────────────────────────────────────────── -->
  <div id="featured-section">
    <p class="section-label">⭐ Featured</p>
    <div class="game-grid featured-grid" id="featured-grid"></div>
  </div>

  <!-- ── All games ───────────────────────────────────────────────────── -->
  <p class="section-label" id="all-label">All Games</p>
  <div class="game-grid" id="game-grid"></div>

  <!-- ── Toast container ─────────────────────────────────────────────── -->
  <div id="toast-container"></div>

  <!-- ── Scripts ─────────────────────────────────────────────────────── -->
  <script src="/js/auth.js"></script>
  <script src="/js/coins.js"></script>
  <script src="/js/games.js"></script>

  <script>
    let activeCategory = '';
    let searchTimeout  = null;

    document.querySelectorAll('#category-bar .pill').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('#category-bar .pill').forEach(p => p.classList.remove('active'));
        btn.classList.add('active');
        activeCategory = btn.dataset.cat;
        loadAllGames();
        updateFeaturedVisibility();
      });
    });

    function updateFeaturedVisibility() {
      document.getElementById('featured-section').style.display =
        activeCategory ? 'none' : '';
    }

    document.getElementById('search-input').addEventListener('input', () => {
      clearTimeout(searchTimeout);
      searchTimeout = setTimeout(loadAllGames, 300);
    });

    async function loadFeatured() {
      Games.renderSkeletons('#featured-grid', 4);
      const games = await Games.fetchGames({ featured: true });
      const grid  = document.getElementById('featured-grid');
      grid.innerHTML = '';
      if (!games.length) {
        document.getElementById('featured-section').style.display = 'none';
        return;
      }
      games.slice(0, 6).forEach(g => grid.appendChild(Games.buildCard(g)));
    }

    async function loadAllGames() {
      const search = document.getElementById('search-input').value.trim();
      const label  = document.getElementById('all-label');
      label.textContent = activeCategory
        ? activeCategory.charAt(0).toUpperCase() + activeCategory.slice(1)
        : search ? 'Results for "' + search + '"' : 'All Games';

      await Games.renderGrid('#game-grid', {
        category: activeCategory || undefined,
        search:   search || undefined,
      });
    }

    document.addEventListener('DOMContentLoaded', () => {
      loadFeatured();
      loadAllGames();
    });
  </script>
</body>
</html>
