<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Leaderboards — dawg.city</title>
  <link rel="icon" href="/favicon.svg" type="image/svg+xml">
  <link rel="stylesheet" href="/css/base.css">
  <style>
    .lb-container { max-width: 700px; margin: 0 auto; padding: 20px; }

    .lb-game-select {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 20px;
    }
    .lb-game-select label { font-weight: 600; color: var(--muted); font-size: 0.9rem; }
    .lb-game-select select {
      flex: 1;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 7px 12px;
      color: var(--text);
      font-size: 0.9rem;
      outline: none;
    }
    .lb-game-select select:focus { border-color: var(--accent); }

    .lb-table {
      width: 100%;
      border-collapse: collapse;
      background: var(--surface);
      border-radius: var(--radius);
      overflow: hidden;
      border: 1px solid var(--border);
    }
    .lb-table thead tr { background: #1e1e1e; }
    .lb-table th {
      padding: 10px 14px;
      text-align: left;
      font-size: 0.78rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--muted);
      border-bottom: 1px solid var(--border);
    }
    .lb-table td {
      padding: 10px 14px;
      font-size: 0.88rem;
      border-bottom: 1px solid var(--border);
    }
    .lb-table tr:last-child td { border-bottom: none; }
    .lb-table tbody tr:hover { background: rgba(255,255,255,0.03); }

    .rank-badge {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 26px;
      height: 26px;
      border-radius: 50%;
      font-size: 0.8rem;
      font-weight: 800;
    }
    .rank-badge.gold   { background: #f5a623; color: #111; }
    .rank-badge.silver { background: #aaa;    color: #111; }
    .rank-badge.bronze { background: #cd7f32; color: #fff; }
    .rank-badge.plain  { background: var(--bg); color: var(--muted); }

    .you-row td { background: rgba(245,166,35,0.07); }

    .score-val { font-weight: 700; color: var(--accent); }

    .empty-lb { text-align: center; padding: 40px; color: var(--muted); }
  </style>
</head>
<body>

  <!-- ── Topbar ──────────────────────────────────────────────────────── -->
  <header id="topbar">
    <a class="logo" href="/">DAWG.CITY</a>
    <div class="topbar-right" id="auth-area"></div>
  </header>

  <!-- ── Content ─────────────────────────────────────────────────────── -->
  <main class="lb-container">
    <p class="section-label" style="padding-left:0">Leaderboards</p>

    <div class="lb-game-select">
      <label for="game-select">Game:</label>
      <select id="game-select">
        <option value="">Loading games…</option>
      </select>
    </div>

    <div id="lb-body">
      <div class="empty-lb">Select a game to see its leaderboard.</div>
    </div>
  </main>

  <!-- ── Scripts ─────────────────────────────────────────────────────── -->
  <script src="/js/auth.js"></script>
  <script src="/js/games.js"></script>

  <script>
    const API = 'https://dawg.city';
    let currentUser = null;

    // ── Populate game dropdown ────────────────────────────────────────
    async function populateGames() {
      const games = await Games.fetchGames();
      const sel   = document.getElementById('game-select');
      sel.innerHTML = '<option value="">— pick a game —</option>';
      games.forEach(g => {
        const opt = document.createElement('option');
        opt.value       = g.slug;
        opt.textContent = g.title;
        sel.appendChild(opt);
      });

      // If ?game= param is in URL, pre-select it
      const preSlug = new URLSearchParams(location.search).get('game');
      if (preSlug) {
        sel.value = preSlug;
        loadLeaderboard(preSlug);
      }
    }

    // ── Load and render leaderboard ───────────────────────────────────
    async function loadLeaderboard(slug) {
      const body = document.getElementById('lb-body');
      body.innerHTML = '<div class="empty-lb">Loading…</div>';

      try {
        const res = await fetch(`${API}/api/games/${encodeURIComponent(slug)}/leaderboard`);
        if (!res.ok) throw new Error();
        const rows = await res.json();

        if (!rows.length) {
          body.innerHTML = '<div class="empty-lb">No scores yet for this game.</div>';
          return;
        }

        const myId = currentUser?.id;
        body.innerHTML = `
          <table class="lb-table">
            <thead>
              <tr>
                <th>#</th>
                <th>Player</th>
                <th>Score</th>
                <th>Date</th>
              </tr>
            </thead>
            <tbody>
              ${rows.map((r, i) => {
                const rank  = i + 1;
                const badge = rank === 1 ? 'gold' : rank === 2 ? 'silver' : rank === 3 ? 'bronze' : 'plain';
                const isYou = r.username === currentUser?.username;
                return `
                  <tr class="${isYou ? 'you-row' : ''}">
                    <td><span class="rank-badge ${badge}">${rank}</span></td>
                    <td>${escHtml(r.username)}${isYou ? ' <span style="color:var(--accent);font-size:0.75rem">(you)</span>' : ''}</td>
                    <td class="score-val">${r.score.toLocaleString()}</td>
                    <td class="muted">${new Date(r.posted_at).toLocaleDateString()}</td>
                  </tr>`;
              }).join('')}
            </tbody>
          </table>`;
      } catch (_) {
        body.innerHTML = '<div class="empty-lb">Failed to load leaderboard.</div>';
      }
    }

    function escHtml(str) {
      return String(str)
        .replace(/&/g,'&amp;').replace(/</g,'&lt;')
        .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    // ── Dropdown change ───────────────────────────────────────────────
    document.getElementById('game-select').addEventListener('change', e => {
      const slug = e.target.value;
      if (slug) {
        history.replaceState(null, '', `?game=${encodeURIComponent(slug)}`);
        loadLeaderboard(slug);
      } else {
        document.getElementById('lb-body').innerHTML =
          '<div class="empty-lb">Select a game to see its leaderboard.</div>';
      }
    });

    // ── Boot ─────────────────────────────────────────────────────────
    document.addEventListener('DOMContentLoaded', async () => {
      currentUser = await Auth.getUser();
      populateGames();
    });
  </script>
</body>
</html>
