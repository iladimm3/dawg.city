[package] 
name = "dawg-city" 
version = "0.1.0" 
edition = "2021" 
 
[[bin]] 
name = "analyze" 
path = "api/analyze.rs" 

[[bin]]
name = "webhook"
path = "api/webhook.rs"
 
[dependencies] 
vercel_runtime = { version = "1" } 
tokio = { version = "1", features = ["macros"] } 
reqwest = { version = "0.11", features = ["json", "rustls-tls"] } 
serde_json = { version = "1" } 
serde = { version = "1", features = ["derive"] } 
once_cell = "1"
regex = "1"
hmac = "0.12"
sha2 = "0.10"
hex = "0.4"
chrono = { version = "0.4", features = ["serde"] }
