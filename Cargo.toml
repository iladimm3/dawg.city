[package] 
name = "dawg-city" 
version = "0.1.0" 
edition = "2021" 
 
[[bin]] 
name = "analyze" 
path = "api/analyze.rs" 
 
[dependencies] 
vercel_runtime = "2.1.1" 
tokio = { version = "1", features = ["full"] } 
reqwest = { version = "0.11", features = ["json"] } 
serde = { version = "1", features = ["derive"] } 
serde_json = "1" 
once_cell = "1"
regex = "1"
