[package] 
name = "dawg_city" 
version = "0.1.0" 
edition = "2021" 
  
[dependencies] 
tokio = { version = "1", features = ["macros", "rt-multi-thread"] } 
vercel_runtime = "1" 
serde = { version = "1.0", features = ["derive"] } 
serde_json = "1.0" 
reqwest = { version = "0.11", features = ["json"] } 
once_cell = "1" 
regex = "1" 

[[bin]]
name = "analyze"
path = "api/analyze.rs"
