[package] 
name = "dawg-city" 
version = "0.1.0" 
edition = "2021" 
 
[[bin]] 
name = "analyze" 
path = "api/analyze.rs" 
 
[dependencies] 
vercel_runtime = { version = "1" } 
tokio = { version = "1", features = ["macros"] } 
reqwest = { version = "0.11", features = ["json", "rustls-tls"] } 
serde_json = { version = "1" } 
serde = { version = "1", features = ["derive"] } 
once_cell = "1"
regex = "1"
